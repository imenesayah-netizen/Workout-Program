<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout</title>
<style>
body { background: #0a0a0f; color: #e8ff47; font-family: monospace; padding: 20px; margin: 0; }
</style>
</head>
<body>
<div id="root"><p>Loading...</p></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
<script>
window.onerror = function(msg, src, line, col, err) {
  document.getElementById('root').innerHTML = '<p style="color:red">ERROR: ' + msg + ' at line ' + line + '</p>';
  return false;
};
</script>
<script type="text/babel">
const App = () => (
  <div>
    <h1>WORKOUT PROGRAMME</h1>
    <p style={{color:"#47c8ff"}}>App loaded successfully!</p>
  </div>
);
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
